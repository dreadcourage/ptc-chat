<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTC Yard Operations Dashboard</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  height: 100vh;
  overflow: hidden;
}

/* ── Dashboard ── */
#dashboard-frame {
  width: 100%;
  height: 100vh;
  border: none;
}

/* ── Chat Button ── */
#chat-btn {
  position: fixed;
  bottom: 18px;
  right: 18px;
  z-index: 9999;
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: #1a56db;
  color: #fff;
  border: none;
  cursor: pointer;
  font-size: 20px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}

/* ── Chat Panel ── */
#chat-panel {
  position: fixed;
  bottom: 90px;
  right: 18px;
  width: 90%;
  max-width: 380px;
  height: 70vh;
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.25);
  display: none;
  flex-direction: column;
  overflow: hidden;
  z-index: 9998;
}

#chat-panel.open {
  display: flex;
}

/* Mobile optimisation */
@media (max-width: 600px) {
  #chat-panel {
    right: 0;
    bottom: 0;
    width: 100%;
    height: 85vh;
    border-radius: 16px 16px 0 0;
  }

  #chat-btn {
    bottom: 12px;
    right: 12px;
  }
}

/* ── Chat UI ── */
.chat-header {
  background: #1a56db;
  color: #fff;
  padding: 14px;
  font-weight: 600;
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.msg {
  padding: 10px 14px;
  border-radius: 12px;
  font-size: 13px;
  max-width: 85%;
}

.msg.bot {
  background: #f3f4f6;
  align-self: flex-start;
}

.msg.user {
  background: #1a56db;
  color: white;
  align-self: flex-end;
}

.result-card {
  background: #f0fdf4;
  border: 1px solid #bbf7d0;
  border-radius: 10px;
  padding: 12px;
  font-size: 13px;
}

.error-card {
  background: #fef2f2;
  border: 1px solid #fecaca;
  border-radius: 10px;
  padding: 12px;
  color: #991b1b;
}

/* ── Form ── */
.chat-form {
  padding: 10px;
  border-top: 1px solid #e5e7eb;
}

.form-row {
  display: flex;
  gap: 6px;
  margin-bottom: 6px;
}

.form-row label {
  font-size: 12px;
  width: 70px;
}

.form-row input, .form-row select {
  flex: 1;
  padding: 6px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

#send-btn {
  width: 100%;
  padding: 8px;
  background: #1a56db;
  color: white;
  border: none;
  border-radius: 8px;
  font-weight: 600;
}

/* ── Loading ── */
.loading {
  display: flex;
  gap: 4px;
}

.loading span {
  width: 8px;
  height: 8px;
  background: #9ca3af;
  border-radius: 50%;
  animation: bounce 1.2s infinite;
}

@keyframes bounce {
  0%, 80%, 100% { transform: scale(0.6); }
  40% { transform: scale(1); }
}
</style>
</head>

<body>

<!-- 🔥 Power BI Embedded -->
<iframe 
  id="dashboard-frame"
  src="https://app.powerbi.com/view?r=eyJrIjoiMjhjMDhhODMtNWI4YS00YjNjLTk2YTItNDJkOGU3YzJmYzYwIiwidCI6IjM0NzZiNzc2LWU5OTAtNGY3Mi1iOTUwLTYyNDg5ODMxNjIzZCIsImMiOjEwfQ%3D%3D"
  allowfullscreen>
</iframe>

<!-- Chat Button -->
<button id="chat-btn" onclick="toggleChat()">💬</button>

<!-- Chat Panel -->
<div id="chat-panel">
  <div class="chat-header">PTC Yard Optimiser</div>

  <div class="chat-messages" id="messages">
    <div class="msg bot">
      Hi! I’ll find the best slot for your container.
    </div>
  </div>

  <div class="chat-form">
    <div class="form-row">
      <label>Yard</label>
      <select id="in-yard">
        <option value="One">One</option>
        <option value="Two">Two</option>
        <option value="Three">Three</option>
        <option value="R">R</option>
        <option value="M">M</option>
      </select>
    </div>

    <div class="form-row">
      <label>Cust</label>
      <input type="number" id="in-customer" value="17">
    </div>

    <div class="form-row">
      <label>Size</label>
      <select id="in-width">
        <option value="1">20ft</option>
        <option value="2">40ft</option>
      </select>
    </div>

    <div class="form-row">
      <label>Laden</label>
      <select id="in-laden">
        <option value="1">Yes</option>
        <option value="0">No</option>
      </select>
    </div>

    <div class="form-row">
      <label>ETA</label>
      <input type="number" id="in-eta" value="240">
    </div>

    <button id="send-btn" onclick="findSlot()">Find Slot</button>
  </div>
</div>

<script>
const API_URL = 'https://raking-freeload-canopy.ngrok-free.dev/solve';
const messages = document.getElementById('messages');

function toggleChat() {
  document.getElementById('chat-panel').classList.toggle('open');
}

function addMsg(text, cls) {
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.innerHTML = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function addCard(html, cls) {
  const div = document.createElement('div');
  div.className = cls;
  div.innerHTML = html;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function addLoading() {
  const div = document.createElement('div');
  div.className = 'loading';
  div.id = 'loading';
  div.innerHTML = '<span></span><span></span><span></span>';
  messages.appendChild(div);
}

function removeLoading() {
  const el = document.getElementById('loading');
  if (el) el.remove();
}

async function findSlot() {
  const yard = document.getElementById('in-yard').value;
  const customer = parseInt(document.getElementById('in-customer').value);
  const width = parseInt(document.getElementById('in-width').value);
  const laden = parseInt(document.getElementById('in-laden').value);
  const eta = parseInt(document.getElementById('in-eta').value);

  addMsg(`Yard ${yard} | Cust ${customer}`, 'user');
  addLoading();

  try {
    const resp = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ yard, customer_id: customer, width, laden, eta })
    });

    const data = await resp.json();
    removeLoading();

    if (data.error) {
      addCard(`Error: ${data.error}`, 'error-card');
    } else {
      addCard(
         `<strong>${data.location}</strong><br>
        Predicted Shift: ${data.predicted_shift}<br>
        Block: ${data.block} | Tier: ${data.tier}`,
        'result-card'
      );
    }

  } catch {
    removeLoading();
    addCard(`Connection failed`, 'error-card');
  }
}
</script>

</body>
</html>
